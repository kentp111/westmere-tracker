<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Westmere — Table Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spectral:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0b1316; --panel:#13201f; --panel2:#0f1a1c;
    --gold:#c9a24b; --gold-dim:#7d6730;
    --parch:#ece4d2; --muted:#8b938f; --line:rgba(201,162,75,.22);
    --hp-good:#5fb86a; --hp-mid:#d8a23a; --hp-low:#d05a4f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Spectral',Georgia,serif; color:var(--parch);
    background:
      radial-gradient(1200px 700px at 50% -10%, #1c2f30 0%, rgba(28,47,48,0) 60%),
      radial-gradient(900px 600px at 85% 110%, #20231a 0%, rgba(0,0,0,0) 55%),
      var(--ink);
    height:100vh; overflow:hidden; padding:1.6vh 1.6vw;
    display:grid; grid-template-rows:auto auto 1fr; gap:1.4vh;
  }
  .hdr{display:flex; align-items:center; justify-content:space-between; gap:2vw;
    border-bottom:1px solid var(--line); padding-bottom:1vh}
  .brand{font-family:'Cinzel',serif; font-weight:700; letter-spacing:.18em;
    font-size:clamp(20px,2.6vw,40px); color:var(--gold)}
  .brand small{display:block; font-family:'Spectral',serif; font-style:italic;
    font-weight:400; letter-spacing:.02em; color:var(--muted); font-size:clamp(11px,.95vw,15px)}
  .scene{flex:1; min-width:0}
  .scene input{width:100%; background:transparent; border:none; color:var(--parch);
    font-family:'Spectral',serif; font-style:italic; font-size:clamp(15px,1.5vw,24px);
    text-align:center; outline:none; border-bottom:1px dashed transparent; padding:.3em 0}
  .scene input:focus{border-bottom:1px dashed var(--gold-dim)}
  .turnbadge{font-family:'Cinzel',serif; text-align:right; min-width:14vw}
  .turnbadge .r{font-size:clamp(11px,.9vw,14px); letter-spacing:.18em; color:var(--muted)}
  .turnbadge .t{font-size:clamp(16px,1.5vw,24px); color:var(--gold); letter-spacing:.04em}

  .party{display:grid; grid-template-columns:1fr 1fr; gap:1.4vw}
  .pc{position:relative; background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line); border-radius:14px; padding:1.3vh 1.3vw 1.3vh 1.6vw;
    display:flex; flex-direction:column; gap:.75vh}
  .pc::before{content:""; position:absolute; left:0; top:14%; bottom:14%; width:4px;
    border-radius:4px; background:var(--accent)}
  .pchead{display:flex; align-items:flex-start; justify-content:space-between; gap:1vw}
  .pc .nm{font-family:'Cinzel',serif; font-weight:600; font-size:clamp(16px,1.7vw,28px);
    letter-spacing:.03em; color:var(--accent); line-height:1.1}
  .pc .sub{font-style:italic; color:var(--muted); font-size:clamp(11px,1vw,15px)}
  .ac{text-align:center; border:1px solid var(--line); border-radius:10px;
    padding:.4vh .9vw; min-width:4.4vw; flex:none}
  .ac .lbl{font-family:'Cinzel',serif; font-size:clamp(9px,.7vw,12px); letter-spacing:.14em; color:var(--muted)}
  .ac .val{font-weight:700; font-size:clamp(20px,2.1vw,34px)}
  .hpwrap{display:flex; align-items:baseline; gap:.6vw}
  .hpnum{font-weight:700; font-size:clamp(26px,3vw,52px); line-height:1}
  .hpmax{color:var(--muted); font-size:clamp(15px,1.4vw,24px)}
  .hplabel{font-family:'Cinzel',serif; letter-spacing:.14em; color:var(--muted);
    font-size:clamp(10px,.8vw,13px); margin-left:auto; align-self:center}
  .bar{height:1.3vh; min-height:9px; background:#0a1112;
    border:1px solid var(--line); border-radius:6px; overflow:hidden}
  .bar > i{display:block; height:100%; transition:width .25s ease, background .25s}
  .ctl{display:flex; flex-wrap:wrap; align-items:center; gap:.5vw}
  .ctl input{width:4.2vw; min-width:44px; background:#0a1112; border:1px solid var(--line);
    color:var(--parch); border-radius:8px; padding:.5vh .4vw; text-align:center;
    font-family:'Spectral',serif; font-size:clamp(13px,1.1vw,18px)}
  button{font-family:'Cinzel',serif; letter-spacing:.06em; cursor:pointer;
    background:#101b1b; color:var(--parch); border:1px solid var(--line);
    border-radius:8px; padding:.55vh .8vw; font-size:clamp(11px,.95vw,15px); transition:all .15s}
  button:hover{border-color:var(--gold); color:var(--gold)}
  button:active{transform:scale(.96)}
  button.dmg:hover{border-color:var(--hp-low); color:var(--hp-low)}
  button.heal:hover{border-color:var(--hp-good); color:var(--hp-good)}
  button.gold{background:#1a1408; border-color:var(--gold-dim); color:var(--gold)}
  button:disabled{opacity:.35; cursor:not-allowed; pointer-events:none}
  .hd-pip{border-radius:3px !important}  /* square pips distinguish hit dice */
  .roll-result{color:var(--hp-good); font-style:italic; font-size:clamp(10px,.85vw,13px); margin-left:.3vw}
  /* Editable initiative for PC rows in the tracker */
  .ini-edit{
    width:3ch; min-width:36px; background:transparent; border:none;
    border-bottom:1px dashed var(--gold-dim); color:var(--gold);
    font-family:'Cinzel',serif; font-weight:700;
    font-size:clamp(15px,1.5vw,24px); text-align:center; outline:none; padding:0;
    -moz-appearance:textfield;
  }
  .ini-edit::-webkit-outer-spin-button,
  .ini-edit::-webkit-inner-spin-button{-webkit-appearance:none; margin:0}
  .ini-edit:focus{border-bottom-color:var(--gold)}
  .conds input{width:100%; background:transparent; border:none; border-bottom:1px solid var(--line);
    color:var(--parch); font-family:'Spectral',serif; font-style:italic; padding:.4vh 0;
    font-size:clamp(12px,1.05vw,17px); outline:none}
  .conds input::placeholder{color:#5a615d}
  .res{display:flex; flex-wrap:wrap; gap:.5vh 1.2vw; margin-top:.2vh}
  .restrack{display:flex; align-items:center; gap:.5vw}
  .restrack .l{font-family:'Cinzel',serif; font-size:clamp(9px,.75vw,12px);
    letter-spacing:.1em; color:var(--muted)}
  .pip{width:clamp(13px,1.1vw,18px); height:clamp(13px,1.1vw,18px); border-radius:50%;
    border:1.5px solid var(--accent); cursor:pointer; transition:all .12s}
  .pip.on{background:var(--accent)}
  .pip.off{background:transparent; opacity:.4}

  .init{background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line); border-radius:14px; padding:1.2vh 1.2vw;
    display:grid; grid-template-rows:auto auto 1fr; gap:1vh; min-height:0}
  .init h2{font-family:'Cinzel',serif; font-weight:600; letter-spacing:.14em;
    color:var(--gold); font-size:clamp(13px,1.2vw,20px); display:flex; align-items:center; gap:1vw}
  .init h2 .dash{flex:1; height:1px; background:var(--line)}
  .initbar{display:flex; flex-wrap:wrap; gap:.6vw; align-items:center}
  .initbar input{background:#0a1112; border:1px solid var(--line); color:var(--parch);
    border-radius:8px; padding:.55vh .6vw; font-family:'Spectral',serif; font-size:clamp(12px,1vw,16px)}
  .initbar input.name{width:11vw; min-width:120px}
  .initbar input.num{width:3.6vw; min-width:48px; text-align:center}
  .rows{overflow-y:auto; display:flex; flex-direction:column; justify-content:flex-start; align-content:flex-start; gap:.7vh; padding-right:.4vw}
  .row{display:flex; flex:0 0 auto; align-items:center; gap:1vw; padding:.8vh 1vw; border-radius:10px;
    background:#0d1718; border:1px solid transparent}
  .row.hero{border-left:3px solid var(--gold-dim)}
  .row.cur{background:#1d2a17; border-color:var(--gold)}
  .row .ini{font-family:'Cinzel',serif; font-weight:700; font-size:clamp(15px,1.5vw,24px);
    color:var(--gold); min-width:2.4ch; text-align:center}
  .row .rn{flex:1; font-size:clamp(14px,1.3vw,22px)}
  .row.cur .rn{color:var(--gold)}
  .row .mhp{display:flex; align-items:center; gap:.5vw; color:var(--muted); font-size:clamp(12px,1vw,16px)}
  .row .mhp b{color:var(--parch); min-width:2.5ch; text-align:center}
  .mini{padding:.2vh .55vw; font-size:clamp(11px,.85vw,14px); line-height:1}
  .x{color:#6b716d; border-color:transparent; background:transparent;
    font-size:clamp(15px,1.3vw,20px); padding:.1vh .5vw}
  .x:hover{color:var(--hp-low); border-color:transparent}
  .hint{color:#5a615d; font-style:italic; font-size:clamp(11px,.9vw,14px); padding:.5vh 1vw}
  .rows::-webkit-scrollbar{width:8px} .rows::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:4px}
</style>
</head>
<body>
  <div class="hdr">
    <div class="brand">WESTMERE<small>the table screen</small></div>
    <div class="scene"><input id="sceneInput" /></div>
    <div class="turnbadge"><div class="r" id="roundLine">EXPLORATION</div><div class="t" id="turnLine">&mdash;</div></div>
  </div>

  <div class="party" id="party"></div>

  <div class="init">
    <h2>Initiative <span class="dash"></span>
      <button id="startBtn" class="gold" onclick="startCombat()">Start combat</button>
      <button onclick="nextTurn()">Next turn &rsaquo;</button>
      <button onclick="endCombat()">End</button>
      <button onclick="resetBoard()">Restore party</button>
    </h2>
    <div class="initbar">
      <input class="name" id="addName" placeholder="Add combatant&hellip;" onkeydown="if(event.key==='Enter')addCombatant()">
      <input class="num" id="addInit" placeholder="init" inputmode="numeric">
      <input class="num" id="addHp" placeholder="hp" inputmode="numeric">
      <button onclick="addCombatant()">+ Add</button>
      <span class="hint">Enter each PC's initiative in their row below, then "Start combat"</span>
    </div>
    <div class="rows" id="rows"></div>
  </div>

<script>
const S = {
  scene:"A foggy morning in Westmere \u2014 Della three nights gone.",
  inCombat:false, round:1, turn:0,
  party:[
    {id:"bram", name:"Bram Holt", sub:"Mountain Dwarf \u00b7 Champion Fighter 3",
     ac:18, hp:31, max:31, color:"#5f93cc", conds:"", lastRoll:"",
     hd:{die:10, total:3, remaining:3, conMod:3},
     res:[{l:"Second Wind", p:[1], sr:true}, {l:"Action Surge", p:[1], sr:true}]},
    {id:"doran", name:"Doran Vale", sub:"Half-Elf \u00b7 College of Lore Bard 3",
     ac:14, hp:21, max:21, color:"#a182d8", conds:"", lastRoll:"",
     hd:{die:8, total:3, remaining:3, conMod:1},
     res:[{l:"Bardic", p:[1,1,1]}, {l:"Slots I", p:[1,1,1,1]}, {l:"Slots II", p:[1,1]}]}
  ],
  init:[ {name:"Bram", ini:null, hp:null, max:null, pc:true},
         {name:"Doran", ini:null, hp:null, max:null, pc:true} ]
};
const $ = id => document.getElementById(id);
$("sceneInput").value = S.scene;
$("sceneInput").addEventListener("input", e => S.scene = e.target.value);
function hpColor(r){ return r>0.5 ? "var(--hp-good)" : r>0.25 ? "var(--hp-mid)" : "var(--hp-low)"; }

function renderParty(){
  const host = $("party"); host.innerHTML = "";
  S.party.forEach((c,ci) => {
    const r = c.max ? c.hp/c.max : 0;
    const card = document.createElement("div");
    card.className = "pc"; card.style.setProperty("--accent", c.color);
    const resHtml = c.res.map((t,ti) =>
      `<div class="restrack"><span class="l">${t.l}</span>` +
      t.p.map((v,pi)=>`<span class="pip ${v?'on':'off'}" onclick="togglePip(${ci},${ti},${pi})"></span>`).join("") +
      `</div>`).join("");
    const hdPips = Array.from({length:c.hd.total},(_,k)=>
      `<span class="pip hd-pip ${k<c.hd.remaining?'on':'off'}"></span>`).join("");
    const rollMsg = c.lastRoll ? `<span class="roll-result">${c.lastRoll}</span>` : '';
    card.innerHTML = `
      <div class="pchead">
        <div><div class="nm">${c.name}</div><div class="sub">${c.sub}</div></div>
        <div class="ac"><div class="lbl">AC</div><div class="val">${c.ac}</div></div>
      </div>
      <div class="hpwrap"><span class="hpnum" style="color:${hpColor(r)}">${c.hp}</span>
        <span class="hpmax">/ ${c.max}</span><span class="hplabel">HIT POINTS</span></div>
      <div class="bar"><i style="width:${Math.max(0,r*100)}%;background:${hpColor(r)}"></i></div>
      <div class="ctl">
        <input id="amt-${c.id}" inputmode="numeric" placeholder="#">
        <button class="dmg" onclick="adjust(${ci},-1,true)">Damage</button>
        <button class="heal" onclick="adjust(${ci},1,true)">Heal</button>
        <button onclick="adjust(${ci},-1,false)">&minus;1</button>
        <button onclick="adjust(${ci},1,false)">+1</button>
        <button onclick="shortRest(${ci})">Short rest</button>
        <button class="gold" onclick="longRest(${ci})">Long rest</button>
      </div>
      <div class="conds"><input value="${c.conds.replace(/"/g,'&quot;')}" placeholder="conditions \u2014 prone, frightened, blessed\u2026" oninput="S.party[${ci}].conds=this.value"></div>
      <div class="res">
        ${resHtml}
        <div class="restrack">
          <span class="l">Hit Dice d${c.hd.die}</span>
          ${hdPips}
          <button class="mini" onclick="spendHD(${ci})" ${c.hd.remaining===0||c.hp>=c.max?'disabled':''}>Spend</button>
          ${rollMsg}
        </div>
      </div>`;
    host.appendChild(card);
  });
}
function adjust(ci, sign, useInput){
  const c = S.party[ci]; let amt = 1;
  if(useInput){ const el=$("amt-"+c.id); amt=parseInt(el.value,10)||0; el.value=""; }
  c.hp = Math.max(0, Math.min(c.max, c.hp + sign*amt)); renderParty();
}
function togglePip(ci,ti,pi){ const p=S.party[ci].res[ti].p; p[pi]=p[pi]?0:1; renderParty(); }

function spendHD(ci){
  const c = S.party[ci];
  if(c.hd.remaining<=0) return;
  const roll = Math.floor(Math.random()*c.hd.die)+1;
  const raw = Math.max(1, roll + c.hd.conMod);
  const before = c.hp;
  c.hp = Math.min(c.max, c.hp + raw);
  const gained = c.hp - before;
  c.hd.remaining--;
  c.lastRoll = `d${c.hd.die}: ${roll}+${c.hd.conMod} \u2192 +${gained} hp`;
  renderParty();
}

function shortRest(ci){
  const c = S.party[ci];
  // Restore short-rest resources (Fighter: Second Wind, Action Surge)
  // Bardic Inspiration and spell slots are long-rest only at level 3
  c.res.forEach(t=>{ if(t.sr) t.p=t.p.map(()=>1); });
  c.lastRoll = "";
  renderParty();
}

function longRest(ci){
  const c=S.party[ci];
  c.hp=c.max;
  c.hd.remaining=c.hd.total;
  c.lastRoll="";
  c.res.forEach(t=>t.p=t.p.map(()=>1));
  renderParty();
}

function sortInit(){ S.init.sort((a,b)=>(b.ini??-99)-(a.ini??-99)); }
function addCombatant(){
  const n=$("addName").value.trim(); if(!n){ $("addName").focus(); return; }
  const ini=parseInt($("addInit").value,10); const hp=parseInt($("addHp").value,10);
  S.init.push({name:n, ini:isNaN(ini)?null:ini, hp:isNaN(hp)?null:hp, max:isNaN(hp)?null:hp, pc:false});
  $("addName").value=""; $("addInit").value=""; $("addHp").value="";
  if(!S.inCombat) sortInit(); renderInit();
}
function removeInit(i){ S.init.splice(i,1); if(S.turn>=S.init.length)S.turn=0; renderInit(); }
function monHp(i,d){ const m=S.init[i]; if(m.hp==null)return; m.hp=Math.max(0,m.hp+d); renderInit(); }
function startCombat(){ if(!S.init.length)return; sortInit(); S.inCombat=true; S.round=1; S.turn=0; renderInit(); }
function nextTurn(){ if(!S.inCombat||!S.init.length)return; S.turn++; if(S.turn>=S.init.length){S.turn=0;S.round++;} renderInit(); }
function endCombat(){ S.inCombat=false; S.round=1; S.turn=0; S.init=S.init.filter(e=>e.pc); S.init.forEach(e=>e.ini=null); renderInit(); }
function resetBoard(){ const had=new Set(S.init.filter(e=>e.pc).map(e=>e.name));
  if(!had.has("Doran")) S.init.unshift({name:"Doran",ini:null,hp:null,max:null,pc:true});
  if(!had.has("Bram")) S.init.unshift({name:"Bram",ini:null,hp:null,max:null,pc:true});
  renderInit(); }

function renderInit(){
  const rows=$("rows"); rows.innerHTML="";
  if(!S.init.length){ rows.innerHTML='<div class="hint">No combatants yet. Add foes above, set each PC\'s initiative, then Start combat.</div>'; }
  S.init.forEach((e,i)=>{
    const cur = S.inCombat && i===S.turn;
    const row=document.createElement("div");
    row.className="row"+(e.pc?" hero":"")+(cur?" cur":"");
    const iniCell = e.pc
      ? `<input type="number" class="ini-edit" value="${e.ini!==null&&e.ini!==undefined?e.ini:''}" placeholder="\u2013"
             oninput="var v=parseInt(this.value,10);S.init[${i}].ini=isNaN(v)?null:v"
             onchange="if(!S.inCombat)sortInit();renderInit();">`
      : `<span class="ini">${e.ini??"\u2013"}</span>`;
    const hp = e.hp!=null ? `<div class="mhp"><button class="mini" onclick="monHp(${i},-1)">&minus;</button><b>${e.hp}</b><button class="mini" onclick="monHp(${i},1)">+</button></div>` : "";
    const x = e.pc ? "" : `<button class="x" onclick="removeInit(${i})">&times;</button>`;
    row.innerHTML=`${iniCell}<span class="rn">${e.name}</span>${hp}${x}`;
    rows.appendChild(row);
  });
  const order = S.inCombat ? S.init[S.turn] : null;
  $("roundLine").textContent = S.inCombat ? ("ROUND "+S.round) : "EXPLORATION";
  $("turnLine").innerHTML = order ? (order.name+"\u2019s turn") : "\u2014";
  $("startBtn").textContent = S.inCombat ? "Restart" : "Start combat";
}
renderParty(); renderInit();
</script>
</body>
</html>
